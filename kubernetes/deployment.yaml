apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: devops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
      - name: nodejs-app
        image: YOUR_ACR_NAME.azurecr.io/nodejs-app:latest
        ports:
        - containerPort: 3000
